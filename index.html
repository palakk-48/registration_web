<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Registration Form</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <div class="box">
      <div class="main">
        <div class="left">
          <img
            src="img.jpg" alt="image"
          />
        </div>

        <div>
          <h2>Music Registration Form</h2>

          <div class="form-grid">
            <div>
              <label>Full Name</label>
              <input type="text" id="name" />
            </div>

            <div>
              <label>Email</label>
              <input type="email" id="email" />
            </div>

            <div>
              <label>Phone Number</label>
              <input type="tel" id="phone" />
            </div>

            <div>
              <label>Age</label>
              <input type="number" id="age" />
            </div>

            <div>
              <label>Date of Birth</label>
              <input type="date" id="dob" />
            </div>

            <div>
              <label>Country</label>

              <select id="country">
                <option>Select Country</option>
                <option>India</option>
                <option>USA</option>
                <option>Canada</option>
                <option>UK</option>
                <option>Australia</option>
              </select>
            </div>

            <div class="full">
              <label>Gender</label>

              <div class="gender">
                <label><input type="radio" name="gender" /> Male</label>

                <label><input type="radio" name="gender" /> Female</label>

                <label><input type="radio" name="gender" /> Other</label>
              </div>
            </div>

            <div>
              <label>Favorite Genre</label>

              <select>
                <option>Pop</option>
                <option>Rock</option>
                <option>Hip-Hop</option>
                <option>Jazz</option>
                <option>Classical</option>
                <option>EDM</option>
              </select>
            </div>

            <div>
              <label>Experience</label>

              <select>
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Professional</option>
              </select>
            </div>

            <div class="full">
              <label>Address</label>

              <textarea rows="3"></textarea>
            </div>

            <div>
              <label>Password</label>

              <div class="password-box">
                <input type="password" id="pass" />

                <button type="button" onclick="togglePassword()">👁</button>
              </div>
            </div>

            <div>
              <label>Confirm Password</label>

              <input type="password" id="cpass" />
            </div>

            <div class="full">
              <label>
                <input type="checkbox" id="terms" style="width: auto" />

                I agree to the Terms & Conditions
              </label>
            </div>

            <div class="full buttons">
              <button onclick="register()">Register</button>

              <button type="reset">Reset</button>
            </div>
          </div>

          <p id="msg"></p>
        </div>
      </div>
    </div>
  </body>
</html>
